    #   action_params:
    #     config: None
    #     app_set: None
    #     user_set: None
    #     infrastructure: None
    #     event_set: None
    #     # Numpy equivalent for random integer between 1 and 5 (inclusive)
    #     num_new_users: 'rng.integers(1, 6)'
    #     sim_set: None